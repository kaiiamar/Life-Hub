<title>Kai's Plan — Month by Month</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f0e8; --bg2:#fffdf9; --bg3:#f2e8d8; --bg4:#e8d8c4;
  --border:rgba(160,110,60,0.15); --border2:rgba(160,110,60,0.28);
  --text:#2c1a0e; --text2:#8a6545; --text3:#b89870;
  --accent:#a0522d; --warm:#6b3a1f; --gold:#c9973a;
  --career:#d4845a; --health:#6b9e7a; --finance:#7a8fa6;
  --growth:#9b7b8a; --thailand:#5f9ea0; --uni:#8b6fb0;
  --habits:#c9973a; --danger:#c0392b;
  --serif:'Playfair Display',serif; --sans:'Plus Jakarta Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}

/* LAYOUT */
.shell{display:flex;flex-direction:column;min-height:100vh;max-width:1100px;margin:0 auto;padding:36px 24px 80px}

/* HEADER */
.hero{margin-bottom:28px}
.hero-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.hero h1{font-family:var(--serif);font-size:clamp(30px,4.5vw,50px);font-weight:600;line-height:1;color:var(--warm);margin-bottom:5px}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero-sub{font-size:12px;color:var(--text2);max-width:520px;line-height:1.7}

/* OVERALL PROGRESS */
.overall{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.ov-stat{text-align:center;min-width:48px}
.ov-val{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--accent);line-height:1}
.ov-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-top:2px}
.ov-bar-wrap{flex:1;min-width:160px}
.ov-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px}
.ov-bar-bg{height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.ov-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:4px;transition:width 0.5s ease}

/* TAB NAVIGATION */
.tab-nav-wrap{position:sticky;top:0;z-index:20;background:var(--bg);padding:8px 0 0;margin-bottom:0}
.tab-nav{display:flex;gap:3px;overflow-x:auto;padding-bottom:0;scrollbar-width:none;-ms-overflow-style:none;border-bottom:2px solid var(--border2)}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 14px 10px;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.15s;font-family:var(--sans);position:relative}
.tab-btn:hover{background:var(--bg3);border-radius:8px 8px 0 0}
.tab-btn.active{border-bottom-color:var(--accent)}
.tab-btn.active .tab-month-name{color:var(--accent);font-weight:600}
.tab-month-num{font-size:9px;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase}
.tab-month-name{font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap}
.tab-pct{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;background:var(--bg3);color:var(--text3);margin-top:1px}
.tab-btn.active .tab-pct{background:rgba(160,82,45,0.12);color:var(--accent)}
.tab-phase-dot{width:5px;height:5px;border-radius:50%;margin-bottom:1px}

/* MONTH PANEL */
.month-panels{padding-top:20px}
.month-panel{display:none;animation:fadeIn 0.2s ease}
.month-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* MONTH HEADER */
.month-hero{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:18px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.month-hero-left{}
.month-phase-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:3px 9px;border-radius:10px;font-weight:600;margin-bottom:8px}
.month-title{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--warm);line-height:1}
.month-tagline{font-size:12px;color:var(--text2);margin-top:4px}
.month-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.pill{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:0.04em}
.pill-career{background:rgba(212,132,90,0.18);color:#7a2a00}
.pill-health{background:rgba(107,158,122,0.18);color:#2d5e3a}
.pill-finance{background:rgba(122,143,166,0.18);color:#2a3f5a}
.pill-growth{background:rgba(155,123,138,0.18);color:#4a2a3a}
.pill-uni{background:rgba(139,111,176,0.18);color:#3a1a5a}
.pill-habits{background:rgba(201,151,58,0.18);color:#5a3a00}
.pill-thailand{background:rgba(95,158,160,0.18);color:#1a4a4a}
.month-hero-right{text-align:right;flex-shrink:0}
.month-pct-big{font-family:var(--serif);font-size:38px;font-weight:600;line-height:1}
.month-done-count{font-size:11px;color:var(--text3);margin-top:2px}
.month-pbar-bg{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:6px;min-width:100px}
.month-pbar-fill{height:100%;border-radius:3px;transition:width 0.4s}

/* MILESTONE + DEADLINE */
.milestone{background:linear-gradient(135deg,#fdf6e8,#f2e8d8);border:1px solid var(--gold);border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.milestone-icon{font-size:22px;flex-shrink:0}
.milestone-text{font-size:13px;font-weight:600;color:var(--warm)}
.milestone-sub{font-size:11px;color:var(--text2)}
.deadline-alert{background:rgba(192,57,43,0.07);border:1px solid rgba(192,57,43,0.22);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--danger)}

/* SECTIONS GRID */
.sections-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.section-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.section-header{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.section-title{font-size:11px;font-weight:600;letter-spacing:0.06em}
.section-count{font-size:10px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:8px}
.items{padding:10px}
.item{display:flex;align-items:flex-start;gap:9px;padding:8px 9px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all 0.12s;margin-bottom:4px}
.item:last-child{margin-bottom:0}
.item:hover{background:var(--bg3);border-color:var(--border)}
.item.done{background:rgba(107,158,122,0.07);border-color:rgba(107,158,122,0.2)}
.item.done .item-text{text-decoration:line-through;color:var(--text3)}
.checkbox{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:var(--bg2);transition:all 0.12s}
.item.done .checkbox{background:var(--health);border-color:var(--health)}
.item.done .checkbox::after{content:'✓';font-size:10px;color:#fff;font-weight:700}
.item-content{flex:1;min-width:0}
.item-text{font-size:12px;line-height:1.45;font-weight:500}
.item-note{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.4}

/* NAV ARROWS */
.month-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.nav-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:var(--sans)}
.nav-btn:hover{background:var(--bg3);color:var(--accent);border-color:var(--accent)}
.nav-btn:disabled{opacity:0.3;cursor:default}
.nav-month-label{font-size:11px;color:var(--text3);text-align:center}

/* RESPONSIVE */
@media(max-width:600px){
  .shell{padding:20px 12px 60px}
  .sections-grid{grid-template-columns:1fr}
  .month-hero{padding:14px 16px}
  .month-title{font-size:20px}
  .overall{gap:12px}
}
</style>

const STORAGE_KEY = 'kai_checklist_v3';
const PHASE_COLORS = {1:'var(--career)',2:'var(--uni)',3:'var(--health)'};
const PHASE_LABELS = {1:'Phase 1 · Clear the Decks',2:'Phase 2 · Launch',3:'Phase 3 · New Era'};
const PHASE_BG = {1:'rgba(212,132,90,0.12)',2:'rgba(139,111,176,0.12)',3:'rgba(107,158,122,0.12)'};

let state = {};
let currentMonth = 0;

function loadState(){ try{ const s=localStorage.getItem(STORAGE_KEY); return s?JSON.parse(s):{} }catch(e){ return {} } }
function saveLocal(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)) }catch(e){} }
function key(mid,si,ii){ return mid+'_'+si+'_'+ii }
function isDone(mid,si,ii){ return !!state[key(mid,si,ii)] }
function getProgress(month){
  let total=0,done=0;
  month.sections.forEach(function(sec,si){ sec.items.forEach(function(_,ii){ total++; if(isDone(month.id,si,ii))done++; }); });
  return {total,done,pct:total===0?0:Math.round(done/total*100)};
}
function pctColor(p){ return p>=80?'#6b9e7a':p>=50?'#c9973a':p>=20?'#d4845a':'#b89870' }

function toggleItem(mid,si,ii){
  const k=key(mid,si,ii); state[k]=!state[k]; saveLocal();
  updatePanel(mid);
  updateTabPct(mid);
  updateSummary();
}

function updateTabPct(mid){
  const month=MONTHS.find(m=>m.id===mid); if(!month) return;
  const pr=getProgress(month);
  const pctEl=document.getElementById('tabpct-'+mid);
  if(pctEl){ pctEl.textContent=pr.pct+'%'; pctEl.style.color=pctColor(pr.pct); }
}

function updatePanel(mid){
  const month=MONTHS.find(m=>m.id===mid); if(!month) return;
  const pr=getProgress(month);
  const pctEl=document.getElementById('mpct-'+mid);
  if(pctEl){ pctEl.textContent=pr.pct+'%'; pctEl.style.color=pctColor(pr.pct); }
  const doneEl=document.getElementById('mdone-'+mid);
  if(doneEl) doneEl.textContent=pr.done+'/'+pr.total+' done';
  const barEl=document.getElementById('mbar-'+mid);
  if(barEl){ barEl.style.width=pr.pct+'%'; barEl.style.background=pctColor(pr.pct); }
  // Re-render items
  month.sections.forEach(function(sec,si){
    sec.items.forEach(function(item,ii){
      const itemEl=document.getElementById('item-'+mid+'_'+si+'_'+ii);
      if(!itemEl) return;
      const done=isDone(mid,si,ii);
      itemEl.className='item'+(done?' done':'');
      const textEl=itemEl.querySelector('.item-text');
      if(textEl) textEl.style.textDecoration=done?'line-through':'none';
    });
  });
}

function updateSummary(){
  let td=0,ti=0;
  MONTHS.forEach(function(m){ const p=getProgress(m); td+=p.done; ti+=p.total; });
  const pct=ti===0?0:Math.round(td/ti*100);
  document.getElementById('total-done').textContent=td;
  document.getElementById('total-items').textContent=ti;
  document.getElementById('total-pct').textContent=pct+'%';
  document.getElementById('total-bar').style.width=pct+'%';
}

function switchTab(idx){
  // deactivate all
  MONTHS.forEach(function(m,i){
    const btn=document.getElementById('tab-'+m.id);
    const panel=document.getElementById('panel-'+m.id);
    if(btn) btn.classList.toggle('active',i===idx);
    if(panel) panel.classList.toggle('active',i===idx);
  });
  currentMonth=idx;
  // scroll tab into view
  const activeBtn=document.getElementById('tab-'+MONTHS[idx].id);
  if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function buildAll(){
  state=loadState();
  const tabNav=document.getElementById('tab-nav');
  const panels=document.getElementById('month-panels');

  MONTHS.forEach(function(month,idx){
    const pr=getProgress(month);

    // TAB BUTTON
    const btn=document.createElement('button');
    btn.className='tab-btn'+(idx===0?' active':'');
    btn.id='tab-'+month.id;
    btn.onclick=function(){ switchTab(idx); };
    btn.innerHTML=
      '<div class="tab-phase-dot" style="background:'+PHASE_COLORS[month.phase]+'"></div>'
      +'<div class="tab-month-num">'+month.year+'</div>'
      +'<div class="tab-month-name">'+month.name+'</div>'
      +'<div class="tab-pct" id="tabpct-'+month.id+'" style="color:'+pctColor(pr.pct)+'">'+pr.pct+'%</div>';
    tabNav.appendChild(btn);

    // PANEL
    const panel=document.createElement('div');
    panel.className='month-panel'+(idx===0?' active':'');
    panel.id='panel-'+month.id;

    // Build panel HTML
    let html='';

    // Month hero
    const pillsH=month.pills.map(function(p){
      const l=p==='uni'?'Uni':p==='thailand'?'Thailand':p.charAt(0).toUpperCase()+p.slice(1);
      return '<span class="pill pill-'+p+'">'+l+'</span>';
    }).join('');

    html+='<div class="month-hero">'
      +'<div class="month-hero-left">'
      +'<div class="month-phase-badge" style="background:'+PHASE_BG[month.phase]+';color:'+PHASE_COLORS[month.phase]+'">'+PHASE_LABELS[month.phase]+'</div>'
      +'<div class="month-title">'+month.name+' '+month.year+'</div>'
      +'<div class="month-tagline">'+month.tagline+'</div>'
      +'<div class="month-pills">'+pillsH+'</div>'
      +'</div>'
      +'<div class="month-hero-right">'
      +'<div class="month-pct-big" id="mpct-'+month.id+'" style="color:'+pctColor(pr.pct)+'">'+pr.pct+'%</div>'
      +'<div class="month-done-count" id="mdone-'+month.id+'">'+pr.done+'/'+pr.total+' done</div>'
      +'<div class="month-pbar-bg"><div class="month-pbar-fill" id="mbar-'+month.id+'" style="width:'+pr.pct+'%;background:'+pctColor(pr.pct)+'"></div></div>'
      +'</div></div>';

    if(month.milestone) html+='<div class="milestone"><div class="milestone-icon">'+month.milestone.icon+'</div><div><div class="milestone-text">'+month.milestone.text+'</div><div class="milestone-sub">'+month.milestone.sub+'</div></div></div>';
    if(month.deadline) html+='<div class="deadline-alert">⚠️ <div><strong>'+month.deadline.text+'</strong> — '+month.deadline.sub+'</div></div>';

    // Sections grid
    html+='<div class="sections-grid">';
    month.sections.forEach(function(sec,si){
      const secDone=sec.items.filter(function(_,ii){ return isDone(month.id,si,ii); }).length;
      html+='<div class="section-card">'
        +'<div class="section-header" style="border-left:3px solid var(--'+sec.color+')">'
        +'<span class="section-title" style="color:var(--'+sec.color+')">'+sec.label+'</span>'
        +'<span class="section-count">'+secDone+'/'+sec.items.length+'</span>'
        +'</div>'
        +'<div class="items">';
      sec.items.forEach(function(item,ii){
        const done=isDone(month.id,si,ii);
        html+='<div class="item'+(done?' done':'')+'" id="item-'+month.id+'_'+si+'_'+ii+'" onclick="toggleItem(\''+month.id+'\','+si+','+ii+')">'
          +'<div class="checkbox"></div>'
          +'<div class="item-content"><div class="item-text">'+item.text+'</div>';
        if(item.note) html+='<div class="item-note">'+item.note+'</div>';
        html+='</div></div>';
      });
      html+='</div></div>';
    });
    html+='</div>';

    // Prev/next nav
    html+='<div class="month-nav">';
    if(idx>0) html+='<button class="nav-btn" onclick="switchTab('+(idx-1)+')">← '+MONTHS[idx-1].name+' '+MONTHS[idx-1].year+'</button>';
    else html+='<div></div>';
    html+='<div class="nav-month-label">'+month.name+' '+month.year+' · Month '+(idx+1)+' of '+MONTHS.length+'</div>';
    if(idx<MONTHS.length-1) html+='<button class="nav-btn" onclick="switchTab('+(idx+1)+')">'+MONTHS[idx+1].name+' '+MONTHS[idx+1].year+' →</button>';
    else html+='<div></div>';
    html+='</div>';

    panel.innerHTML=html;
    panels.appendChild(panel);
  });

  updateSummary();
}

buildAll();
</script>
</body>
</html>
